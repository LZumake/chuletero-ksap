<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Chuletero KSAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/fontsource-inter@4.5.0/index.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Segoe UI', 'sans-serif'] },
                    colors: {
                        ksap: { primary: '#667eea', secondary: '#764ba2', dark: '#1a1a2e', surface: '#16213e' }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .chip { transition: all 0.2s ease; }
        .chip.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border-color: transparent;
            box-shadow: 0 4px 6px rgba(102, 126, 234, 0.3);
        }
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:active { transform: scale(0.98); }
        .modal-enter { animation: modalSlideIn 0.3s ease-out forwards; }
        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-ksap-dark text-gray-800 dark:text-gray-100 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/90 dark:bg-ksap-surface/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-700 shadow-sm">
        <div class="max-w-3xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between mb-3">
                <h1 class="text-xl font-bold bg-gradient-to-r from-ksap-primary to-ksap-secondary bg-clip-text text-transparent">
                    📚 Chuletero KSAP
                </h1>
                <div class="flex gap-2">
                    <button id="reset-data-btn" class="p-2 rounded-full hover:bg-red-100 dark:hover:bg-red-900/30 text-red-500 transition-colors" title="Restablecer datos originales">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" aria-label="Cambiar tema">
                        <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                        <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                </div>
            </div>
            <div class="relative">
                <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="search-input" placeholder="Buscar elemento, sintaxis o error..." 
                    class="w-full pl-10 pr-4 py-2.5 bg-gray-100 dark:bg-gray-800 border border-transparent rounded-xl focus:outline-none focus:ring-2 focus:ring-ksap-primary focus:bg-white dark:focus:bg-gray-900 transition-all text-sm">
            </div>
        </div>
    </header>

    <!-- Filters -->
    <div class="sticky top-[105px] z-40 bg-gray-50/95 dark:bg-ksap-dark/95 backdrop-blur-sm border-b border-gray-200 dark:border-gray-700 py-3">
        <div class="max-w-3xl mx-auto px-4 space-y-3">
            <div class="flex items-center justify-between">
                <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Filtros acumulativos</span>
                <button id="clear-filters" class="text-xs text-ksap-primary font-medium hover:underline hidden">Limpiar todo</button>
            </div>
            <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1" id="filter-lenguaje"></div>
            <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1" id="filter-categoria"></div>
            <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1" id="filter-tipo"></div>
        </div>
    </div>

    <!-- Content -->
    <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-4 pb-24">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-sm font-semibold text-gray-600 dark:text-gray-300">
                Resultados: <span id="result-count" class="text-ksap-primary">0</span>
            </h2>
        </div>
        <div id="cards-container" class="space-y-4"></div>
        <div id="empty-state" class="hidden flex-col items-center justify-center py-12 text-center">
            <div class="w-16 h-16 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center mb-4">
                <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h3 class="text-lg font-semibold text-gray-700 dark:text-gray-200 mb-1">No se encontraron resultados</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400">Prueba a ajustar los filtros, el término de búsqueda o añade un nuevo registro.</p>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button id="fab-add" class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-r from-ksap-primary to-ksap-secondary text-white rounded-full shadow-lg flex items-center justify-center hover:scale-105 active:scale-95 transition-transform z-50" aria-label="Añadir registro">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
    </button>

    <!-- Modal -->
    <div id="add-modal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" id="modal-backdrop"></div>
        <div class="absolute inset-x-0 bottom-0 md:inset-0 md:flex md:items-center md:justify-center p-4">
            <div class="bg-white dark:bg-ksap-surface w-full max-w-lg rounded-t-2xl md:rounded-2xl shadow-2xl modal-enter max-h-[90vh] overflow-y-auto">
                <div class="sticky top-0 bg-white dark:bg-ksap-surface border-b border-gray-200 dark:border-gray-700 p-4 flex items-center justify-between z-10">
                    <h3 id="modal-title" class="text-lg font-bold text-gray-900 dark:text-white">Añadir Nuevo Registro</h3>
                    <button id="modal-close" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <form id="add-form" class="p-4 space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase mb-1">Lenguaje *</label>
                            <input type="text" name="lenguaje" required list="lenguaje-list" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-ksap-primary text-sm">
                            <datalist id="lenguaje-list"></datalist>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase mb-1">Categoría *</label>
                            <input type="text" name="categoria" required list="categoria-list" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-ksap-primary text-sm">
                            <datalist id="categoria-list"></datalist>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase mb-1">Tipo de Elemento *</label>
                        <input type="text" name="tipo" required list="tipo-list" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-ksap-primary text-sm">
                        <datalist id="tipo-list"></datalist>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase mb-1">Elemento *</label>
                        <input type="text" name="elemento" required class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-ksap-primary text-sm font-semibold">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase mb-1">Sintaxis / Patrón</label>
                        <input type="text" name="sintaxis" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-ksap-primary text-sm font-mono text-ksap-primary">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase mb-1">Descripción *</label>
                        <textarea name="descripcion" required rows="2" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-ksap-primary text-sm resize-none"></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase mb-1">Ejemplo KSAP</label>
                            <textarea name="ejemplo" rows="2" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-ksap-primary text-sm resize-none"></textarea>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase mb-1">Errores Comunes</label>
                            <textarea name="errores" rows="2" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-ksap-primary text-sm resize-none"></textarea>
                        </div>
                    </div>
                    <div class="pt-2 flex gap-3">
                        <button type="button" id="delete-btn" class="hidden flex-1 py-3 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 font-semibold rounded-xl border border-red-200 dark:border-red-800 hover:bg-red-100 dark:hover:bg-red-900/40 transition-all active:scale-[0.98]">
                            Eliminar
                        </button>
                        <button type="submit" id="submit-btn" class="flex-[2] py-3 bg-gradient-to-r from-ksap-primary to-ksap-secondary text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all active:scale-[0.98]">
                            Guardar Registro
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Datos extraídos directamente de CHULETERO.xlsx
        const defaultDataRaw = [
            { lenguaje: "HTML", categoria: "Estructura", tipo: "Declaración", elemento: "DOCTYPE", sintaxis: "<!DOCTYPE html>", descripcion: "Declara HTML5 moderno", ejemplo: "Primera línea de index.html", errores: "Olvidarlo activa el 'quirks mode'" },
            { lenguaje: "HTML", categoria: "Estructura", tipo: "Etiqueta", elemento: "html", sintaxis: "<html lang=\"es\">", descripcion: "Raíz del documento + idioma", ejemplo: "<html lang=\"es\"> en todas las páginas", errores: "No poner lang perjudica el SEO" },
            { lenguaje: "HTML", categoria: "Estructura", tipo: "Contenedor", elemento: "head", sintaxis: "<head>...</head>", descripcion: "Metadatos (no visibles)", ejemplo: "<head><meta charset=\"UTF-8\"></head>", errores: "Confundirlo con body" },
            { lenguaje: "HTML", categoria: "Estructura", tipo: "Contenedor", elemento: "body", sintaxis: "<body>...</body>", descripcion: "Contenido visible de la página", ejemplo: "<body><nav>...<main>...</body>", errores: "Poner metadatos dentro de body" },
            { lenguaje: "HTML", categoria: "Semántica", tipo: "Etiqueta", elemento: "nav", sintaxis: "<nav>...</nav>", descripcion: "Barra de navegación principal", ejemplo: "<nav class=\"navbar\">...</nav>", errores: "Usar div en lugar de nav" },
            { lenguaje: "HTML", categoria: "Semántica", tipo: "Etiqueta", elemento: "header", sintaxis: "<header>...</header>", descripcion: "Cabecera de página o sección", ejemplo: "<header><h1>Ksap</h1></header>", errores: "Usar múltiples headers sin contexto" },
            { lenguaje: "HTML", categoria: "Semántica", tipo: "Etiqueta", elemento: "main", sintaxis: "<main>...</main>", descripcion: "Contenido único central (solo 1)", ejemplo: "<main id=\"app-content\">...</main>", errores: "Poner más de uno por página" },
            { lenguaje: "HTML", categoria: "Semántica", tipo: "Etiqueta", elemento: "section", sintaxis: "<section>...</section>", descripcion: "Agrupación temática con título", ejemplo: "<section class=\"stats-panel\">", errores: "Usarlo como div genérico" },
            { lenguaje: "HTML", categoria: "Semántica", tipo: "Etiqueta", elemento: "footer", sintaxis: "<footer>...</footer>", descripcion: "Pie de página o de sección", ejemplo: "<footer class=\"fixed-footer\">", errores: "Ponerlo fuera de main cuando es de contenido" },
            { lenguaje: "HTML", categoria: "Semántica", tipo: "Etiqueta", elemento: "article", sintaxis: "<article>...</article>", descripcion: "Contenido independiente", ejemplo: "<article class=\"task-card\">", errores: "Confundirlo con section" },
            { lenguaje: "HTML", categoria: "Semántica", tipo: "Etiqueta", elemento: "div", sintaxis: "<div>...</div>", descripcion: "Contenedor genérico (sin significado)", ejemplo: "<div class=\"card shadow-sm\">", errores: "Usarlo cuando existe etiqueta semántica" },
            { lenguaje: "HTML", categoria: "Formularios", tipo: "Contenedor", elemento: "form", sintaxis: "<form id=\"x\">...</form>", descripcion: "Contenedor de inputs con acción", ejemplo: "<form id=\"login-form\">", errores: "Olvidar el action o method" },
            { lenguaje: "HTML", categoria: "Formularios", tipo: "Input", elemento: "input", sintaxis: "<input type=\"x\">", descripcion: "Campo de entrada genérico", ejemplo: "<input type=\"email\" id=\"email\">", errores: "No poner type (por defecto es text)" },
            { lenguaje: "HTML", categoria: "Formularios", tipo: "Input", elemento: "textarea", sintaxis: "<textarea>...</textarea>", descripcion: "Campo de texto multilínea", ejemplo: "<textarea id=\"nota-tarea\">", errores: "Olvidar cerrar la etiqueta" },
            { lenguaje: "HTML", categoria: "Formularios", tipo: "Select", elemento: "select", sintaxis: "<select>...</select>", descripcion: "Menú desplegable de opciones", ejemplo: "<select id=\"filtro-responsable\">", errores: "No poner options dentro" },
            { lenguaje: "HTML", categoria: "Formularios", tipo: "Botón", elemento: "button", sintaxis: "<button type=\"x\">", descripcion: "Botón clickeable", ejemplo: "<button type=\"submit\">Guardar</button>", errores: "Olvidar type (recarga el form)" },
            { lenguaje: "HTML", categoria: "Formularios", tipo: "Etiqueta", elemento: "label", sintaxis: "<label for=\"x\">", descripcion: "Etiqueta asociada a un input", ejemplo: "<label for=\"password\">Contraseña</label>", errores: "No usar for (pierde accesibilidad)" },
            { lenguaje: "HTML", categoria: "Atributos", tipo: "Identificador", elemento: "id", sintaxis: "id=\"...\"", descripcion: "Identificador ÚNICO en toda la página", ejemplo: "id=\"search-input\"", errores: "Poner IDs duplicados (rompe JS)" },
            { lenguaje: "HTML", categoria: "Atributos", tipo: "Clase", elemento: "class", sintaxis: "class=\"...\"", descripcion: "Clase para CSS/JS (repetible)", ejemplo: "class=\"card shadow-sm\"", errores: "Usar class cuando necesitas un ID único" },
            { lenguaje: "HTML", categoria: "Atributos", tipo: "Dato custom", elemento: "data-*", sintaxis: "data-x=\"...\"", descripcion: "Almacena datos custom para JS", ejemplo: "data-id=\"${tarea.id}\"", errores: "No usar comillas en el valor" },
            { lenguaje: "HTML", categoria: "Atributos", tipo: "Estado", elemento: "hidden", sintaxis: "hidden", descripcion: "Oculta elemento sin eliminarlo del DOM", ejemplo: "<div hidden id=\"modal\">", errores: "Confundirlo con display: none" },
            { lenguaje: "HTML", categoria: "Atributos", tipo: "Estado", elemento: "disabled", sintaxis: "disabled", descripcion: "Desactiva interacción (inputs/buttons)", ejemplo: "<button disabled>Cargando...</button>", errores: "Olvidar quitarlo tras cargar" },
            { lenguaje: "HTML", categoria: "Atributos", tipo: "Validación", elemento: "required", sintaxis: "required", descripcion: "Obliga a rellenar antes de enviar form", ejemplo: "<input type=\"text\" required>", errores: "No dar feedback visual al usuario" },
            { lenguaje: "HTML", categoria: "Accesibilidad", tipo: "Atributo", elemento: "aria-label", sintaxis: "aria-label=\"...\"", descripcion: "Describe elemento a lectores de pantalla", ejemplo: "<button aria-label=\"Cerrar menú\">", errores: "No usarlo en iconos sin texto" },
            { lenguaje: "HTML", categoria: "Accesibilidad", tipo: "Atributo", elemento: "alt", sintaxis: "alt=\"...\"", descripcion: "Texto alternativo para imágenes", ejemplo: "<img src=\"logo.png\" alt=\"Logo Ksap\">", errores: "Dejarlo vacío en imágenes informativas" },
            { lenguaje: "HTML", categoria: "Meta", tipo: "Etiqueta", elemento: "meta charset", sintaxis: "<meta charset=\"UTF-8\">", descripcion: "Define codificación de caracteres", ejemplo: "<meta charset=\"UTF-8\">", errores: "Ponerlo después del title" },
            { lenguaje: "HTML", categoria: "Meta", tipo: "Etiqueta", elemento: "meta viewport", sintaxis: "<meta name=\"viewport\">", descripcion: "Adapta escala a móviles", ejemplo: "<meta name=\"viewport\" content=\"width=device-width\">", errores: "Olvidarlo rompe el responsive" },
            { lenguaje: "HTML", categoria: "Errores", tipo: "Problema", elemento: "IDs duplicados", sintaxis: "", descripcion: "JS solo encuentra el primero y falla", ejemplo: "Usar class para listas dinámicas", errores: "No revisar que los IDs sean únicos" },
            { lenguaje: "HTML", categoria: "Errores", tipo: "Problema", elemento: "Button sin type", sintaxis: "", descripcion: "Recarga form por defecto", ejemplo: "Usar <button type=\"button\">", errores: "Asumir que todos los botones son submit" },
            { lenguaje: "CSS", categoria: "Selectores", tipo: "Clase", elemento: ".clase", sintaxis: ".clase { }", descripcion: "Selecciona por atributo class", ejemplo: ".card { padding: 1rem; }", errores: "Confundirlo con #id" },
            { lenguaje: "CSS", categoria: "Selectores", tipo: "ID", elemento: "#id", sintaxis: "#id { }", descripcion: "Selecciona por atributo id (único)", ejemplo: "#search-input { width: 100%; }", errores: "Usarlo para elementos repetidos" },
            { lenguaje: "CSS", categoria: "Selectores", tipo: "Etiqueta", elemento: "elemento", sintaxis: "elemento { }", descripcion: "Selecciona por etiqueta HTML", ejemplo: "nav { background: #fff; }", errores: "Afecta a TODOS los elementos de ese tipo" },
            { lenguaje: "CSS", categoria: "Selectores", tipo: "Hijo", elemento: "selector > hijo", sintaxis: "selector > hijo { }", descripcion: "Selecciona hijo directo", ejemplo: ".nav > a { margin: 0 10px; }", errores: "Confundirlo con espacio (descendiente)" },
            { lenguaje: "CSS", categoria: "Selectores", tipo: "Pseudo-clase", elemento: ":hover", sintaxis: ":hover { }", descripcion: "Estado al pasar ratón", ejemplo: ".btn:hover { opacity: 0.9; }", errores: "No definir estado base primero" },
            { lenguaje: "CSS", categoria: "Selectores", tipo: "Pseudo-clase", elemento: ":nth-child(n)", sintaxis: ":nth-child(n) { }", descripcion: "Selecciona por posición", ejemplo: "tr:nth-child(even) { background: #f9f9f9; }", errores: "Confundir :nth-child con :nth-of-type" },
            { lenguaje: "CSS", categoria: "Modelo Caja", tipo: "Espacio externo", elemento: "margin", sintaxis: "margin: X;", descripcion: "Espacio EXTERIOR (separa de otros)", ejemplo: "margin: 1rem auto; (centra)", errores: "Confundirlo con padding" },
            { lenguaje: "CSS", categoria: "Modelo Caja", tipo: "Espacio interno", elemento: "padding", sintaxis: "padding: X;", descripcion: "Espacio INTERIOR (separa contenido)", ejemplo: "padding: 0.8rem 1rem;", errores: "No considerar que aumenta el tamaño total" },
            { lenguaje: "CSS", categoria: "Modelo Caja", tipo: "Borde", elemento: "border", sintaxis: "border: X solid Y;", descripcion: "Línea alrededor del padding", ejemplo: "border: 1px solid #e9ecef;", errores: "Olvidar que suma al tamaño total" },
            { lenguaje: "CSS", categoria: "Modelo Caja", tipo: "Cálculo", elemento: "box-sizing", sintaxis: "box-sizing: X;", descripcion: "Cómo se calcula el ancho total", ejemplo: "box-sizing: border-box; (recomendado)", errores: "No usarlo (el layout se rompe)" },
            { lenguaje: "CSS", categoria: "Posicionamiento", tipo: "Flujo normal", elemento: "position: static", sintaxis: "position: static;", descripcion: "Flujo normal (por defecto)", ejemplo: "Elementos siguen el orden HTML", errores: "Intentar usar z-index (no funciona)" },
            { lenguaje: "CSS", categoria: "Posicionamiento", tipo: "Relativo", elemento: "position: relative", sintaxis: "position: relative;", descripcion: "Relativo a posición original", ejemplo: "Contenedor padre para hijos absolute", errores: "Olvidar que mantiene su espacio" },

            { lenguaje: "Git", categoria: "Errores", tipo: "Problema", elemento: "Merge Conflict", sintaxis: "", descripcion: "Abre archivo y busca <<<<<<< y elige código", ejemplo: "", errores: "No entrar en pánico (es normal)" },
            { lenguaje: "Git", categoria: "Buenas Prácticas", tipo: "Mensajes estándar", elemento: "Convencional", sintaxis: "feat: / fix: / docs:", descripcion: "feat: (nueva función) / fix: (bug) / docs: (documentación)", ejemplo: "Usar prefijos convencionales", errores: "No seguir convención (caos en historial)" },
            { lenguaje: "Regex", categoria: "Sintaxis", tipo: "Inicio", elemento: "^", sintaxis: "^patrón", descripcion: "Inicio de cadena", ejemplo: "^Hola (Empieza por \"Hola\")", errores: "No usarlo (encuentra en cualquier posición)" },
            { lenguaje: "Regex", categoria: "Sintaxis", tipo: "Final", elemento: "$", sintaxis: "patrón$", descripcion: "Final de cadena", ejemplo: "mundo$ (Termina en \"mundo\")", errores: "No usarlo (valida parcialmente)" },
            { lenguaje: "Regex", categoria: "Sintaxis", tipo: "Conjunto", elemento: "[abc]", sintaxis: "[abc]", descripcion: "Coincide con a o b o c", ejemplo: "[aeiou] (Cualquier vocal)", errores: "No escapar caracteres especiales" },
            { lenguaje: "Regex", categoria: "Sintaxis", tipo: "Rango", elemento: "[a-z]", sintaxis: "[a-z]", descripcion: "Rango de letras", ejemplo: "[A-Z] (Cualquier mayúscula)", errores: "Confundir [a-z] con [A-Z]" },
            { lenguaje: "Regex", categoria: "Sintaxis", tipo: "Dígito", elemento: "\\d", sintaxis: "\\d", descripcion: "Cualquier dígito (0-9)", ejemplo: "\\d{3} (3 números seguidos)", errores: "Usar d en lugar de \\d" },
            { lenguaje: "Regex", categoria: "Sintaxis", tipo: "Palabra", elemento: "\\w", sintaxis: "\\w", descripcion: "Letra y número o guion bajo", ejemplo: "\\w+ (Palabra completa)", errores: "No saber que incluye números" },
            { lenguaje: "Regex", categoria: "Sintaxis", tipo: "Espacio", elemento: "\\s", sintaxis: "\\s", descripcion: "Espacio en blanco", ejemplo: "Juan\\sPerez", errores: "No saber que incluye tabs y saltos" },
            { lenguaje: "Regex", categoria: "Cuantificador", tipo: "Uno o más", elemento: "+", sintaxis: "patrón+", descripcion: "1 o más veces", ejemplo: "\\d+ (Uno o varios números)", errores: "Confundir + con *" },
            { lenguaje: "Regex", categoria: "Cuantificador", tipo: "Cero o más", elemento: "*", sintaxis: "patrón*", descripcion: "0 o más veces", ejemplo: "a*b (b, ab, aab)", errores: "Hacer match demasiado amplio" },
            { lenguaje: "Regex", categoria: "Cuantificador", tipo: "Opcional", elemento: "?", sintaxis: "patrón?", descripcion: "0 o 1 vez (opcional)", ejemplo: "colou?r (color o colour)", errores: "No saber que es greedy" },
            { lenguaje: "Regex", categoria: "Cuantificador", tipo: "Exacto", elemento: "{n}", sintaxis: "patrón{n}", descripcion: "Exactamente n veces", ejemplo: "\\d{4} (4 dígitos, ej: año)", errores: "No contar bien" },
            { lenguaje: "Regex", categoria: "Cuantificador", tipo: "Rango", elemento: "{n,m}", sintaxis: "patrón{n,m}", descripcion: "Entre n y m veces", ejemplo: "\\w{3,10} (Entre 3 y 10 caracteres)", errores: "Invertir n y m" },
            { lenguaje: "Regex", categoria: "Patrones", tipo: "Email", elemento: "Email Regex", sintaxis: "/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/", descripcion: "Texto + @ + texto + . + texto", ejemplo: "/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/", errores: "No validar en servidor también" },
            { lenguaje: "Regex", categoria: "Patrones", tipo: "Contraseña", elemento: "Pass Regex", sintaxis: "/^(?=.*[A-Z])(?=.*\\d)[A-Za-z\\d]{8,}$/", descripcion: "Mín 8 chars y 1 mayúscula y 1 número", ejemplo: "/^(?=.*[A-Z])(?=.*\\d)[A-Za-z\\d]{8,}$/", errores: "No usar lookaheads correctamente" },
            { lenguaje: "Regex", categoria: "Patrones", tipo: "Nombre", elemento: "Name Regex", sintaxis: "/^[a-zA-ZáéíóúÁÉÍÓÚñÑ\\s]{3,}$/", descripcion: "Solo letras con tildes/ñ y mín 3 chars", ejemplo: "/^[a-zA-ZáéíóúÁÉÍÓÚñÑ\\s]{3,}$/", errores: "No incluir tildes y ñ" },
            { lenguaje: "Regex", categoria: "Patrones", tipo: "Teléfono", elemento: "Phone Regex", sintaxis: "/^[679]\\d{8}$/", descripcion: "Empieza por 6, 7 o 9 y 8 dígitos", ejemplo: "/^[679]\\d{8}$/ (España)", errores: "No adaptar al país" },
            { lenguaje: "Regex", categoria: "Patrones", tipo: "Código Postal", elemento: "CP Regex", sintaxis: "/^\\d{5}$/", descripcion: "Exactamente 5 números", ejemplo: "/^\\d{5}$/ (España)", errores: "No validar formato" },
            { lenguaje: "Regex", categoria: "Métodos", tipo: "Test", elemento: ".test(str)", sintaxis: "regex.test(str)", descripcion: "Devuelve true/false", ejemplo: "regexEmail.test(input.value) (Validar form)", errores: "No usarlo para validación simple" },
            { lenguaje: "Regex", categoria: "Métodos", tipo: "Match", elemento: ".match(regex)", sintaxis: "str.match(regex)", descripcion: "Array de coincidencias", ejemplo: "\"Tel: 600123456\".match(/\\d+/) → [\"600123456\"]", errores: "No usar g flag para todas las coincidencias" },
            { lenguaje: "Regex", categoria: "Métodos", tipo: "Replace", elemento: ".replace(regex, new)", sintaxis: "str.replace(regex, new)", descripcion: "Sustituye texto", ejemplo: "\"Hola mundo\".replace(/mundo/, \"casa\")", errores: "No usar g flag (solo reemplaza primero)" },
            { lenguaje: "Regex", categoria: "Errores", tipo: "Problema", elemento: "Olvidar ^ y $", sintaxis: "", descripcion: "Valida si patrón existe en cualquier parte", ejemplo: "\"abc123def\".test(/\\d+/) da true", errores: "No anclar el patrón" },
            { lenguaje: "Regex", categoria: "Errores", tipo: "Problema", elemento: "No escapar punto", sintaxis: "", descripcion: ". en regex = \"cualquier carácter\"", ejemplo: "Para punto real usar \\.", errores: "Buscar dominio y encontrar cualquier cosa" },
            { lenguaje: "Regex", categoria: "Errores", tipo: "Problema", elemento: "Regex muy compleja", sintaxis: "", descripcion: "Difícil de mantener", ejemplo: "Dividir en partes o usar validadores HTML5", errores: "No probar con casos borde" }
        ];

        const defaultData = defaultDataRaw.map((item, index) => ({ ...item, id: `def_${index}`, isCustom: false }));
        let activeFilters = { lenguaje: null, categoria: null, tipo: null };
        let searchQuery = "";
        let editingId = null;

        function getActiveData() {
            let customData = [];
            let deletedIds = [];
            try {
                const savedCustom = localStorage.getItem('ksap_chuletero_custom');
                if (savedCustom) customData = JSON.parse(savedCustom);
                const savedDeleted = localStorage.getItem('ksap_chuletero_deleted');
                if (savedDeleted) deletedIds = JSON.parse(savedDeleted);
            } catch (e) {
                console.warn("Error al cargar localStorage (posiblemente bloqueado):", e);
            }
            
            let active = defaultData.filter(d => !deletedIds.includes(d.id));
            
            customData.forEach(c => {
                const idx = active.findIndex(d => d.id === c.id);
                if (idx >= 0) active[idx] = { ...c, isCustom: true };
                else active.push({ ...c, isCustom: true });
            });
            
            return active;
        }

        function saveCustomData(item) {
            const savedCustom = localStorage.getItem('ksap_chuletero_custom');
            let customData = savedCustom ? JSON.parse(savedCustom) : [];
            const existingIdx = customData.findIndex(d => d.id === item.id);
            if (existingIdx >= 0) customData[existingIdx] = item;
            else customData.push(item);
            localStorage.setItem('ksap_chuletero_custom', JSON.stringify(customData));
        }

        window.deleteData = function(id) {
            if (!confirm('¿Estás seguro de que quieres eliminar este registro?')) return;
            const isDefault = id.startsWith('def_');
            if (isDefault) {
                const savedDeleted = localStorage.getItem('ksap_chuletero_deleted');
                let deletedIds = savedDeleted ? JSON.parse(savedDeleted) : [];
                if (!deletedIds.includes(id)) {
                    deletedIds.push(id);
                    localStorage.setItem('ksap_chuletero_deleted', JSON.stringify(deletedIds));
                }
            } else {
                const savedCustom = localStorage.getItem('ksap_chuletero_custom');
                let customData = savedCustom ? JSON.parse(savedCustom) : [];
                customData = customData.filter(d => d.id !== id);
                localStorage.setItem('ksap_chuletero_custom', JSON.stringify(customData));
            }
            renderFilters();
            renderCards();
        };

        function resetData() {
            if (confirm('¿Estás seguro de que quieres borrar todos los cambios y volver a los datos originales?')) {
                localStorage.removeItem('ksap_chuletero_custom');
                localStorage.removeItem('ksap_chuletero_deleted');
                activeFilters = { lenguaje: null, categoria: null, tipo: null };
                searchQuery = "";
                document.getElementById('search-input').value = "";
                renderFilters();
                renderCards();
            }
        }

        function getUniqueValues(column, parentFilters) {
            let data = getActiveData();
            if (parentFilters.lenguaje) data = data.filter(d => d.lenguaje === parentFilters.lenguaje);
            if (parentFilters.categoria) data = data.filter(d => d.categoria === parentFilters.categoria);
            return [...new Set(data.map(d => d[column]))].sort();
        }

        function createChip(text, isActive, onClick) {
            const btn = document.createElement('button');
            btn.className = `chip whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-medium border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:border-ksap-primary dark:hover:border-ksap-primary ${isActive ? 'active' : ''}`;
            btn.textContent = text;
            btn.onclick = onClick;
            return btn;
        }

        function updateDatalists() {
            const data = getActiveData();
            document.getElementById('lenguaje-list').innerHTML = [...new Set(data.map(d => d.lenguaje))].sort().map(l => `<option value="${l}">`).join('');
            document.getElementById('categoria-list').innerHTML = [...new Set(data.map(d => d.categoria))].sort().map(c => `<option value="${c}">`).join('');
            document.getElementById('tipo-list').innerHTML = [...new Set(data.map(d => d.tipo))].sort().map(t => `<option value="${t}">`).join('');
        }

        function renderFilters() {
            const filterLenguajeEl = document.getElementById('filter-lenguaje');
            const filterCategoriaEl = document.getElementById('filter-categoria');
            const filterTipoEl = document.getElementById('filter-tipo');
            
            filterLenguajeEl.innerHTML = '';
            getUniqueValues('lenguaje', { lenguaje: null, categoria: null }).forEach(lang => {
                filterLenguajeEl.appendChild(createChip(lang, activeFilters.lenguaje === lang, () => toggleFilter('lenguaje', lang)));
            });

            filterCategoriaEl.innerHTML = '';
            if (activeFilters.lenguaje) {
                getUniqueValues('categoria', { lenguaje: activeFilters.lenguaje, categoria: null }).forEach(cat => {
                    filterCategoriaEl.appendChild(createChip(cat, activeFilters.categoria === cat, () => toggleFilter('categoria', cat)));
                });
            }

            filterTipoEl.innerHTML = '';
            if (activeFilters.lenguaje && activeFilters.categoria) {
                getUniqueValues('tipo', { lenguaje: activeFilters.lenguaje, categoria: activeFilters.categoria }).forEach(tipo => {
                    filterTipoEl.appendChild(createChip(tipo, activeFilters.tipo === tipo, () => toggleFilter('tipo', tipo)));
                });
            }

            document.getElementById('clear-filters').classList.toggle('hidden', !activeFilters.lenguaje && !activeFilters.categoria && !activeFilters.tipo);
        }

        function toggleFilter(level, value) {
            if (activeFilters[level] === value) {
                activeFilters[level] = null;
                if (level === 'lenguaje') { activeFilters.categoria = null; activeFilters.tipo = null; } 
                else if (level === 'categoria') { activeFilters.tipo = null; }
            } else {
                activeFilters[level] = value;
                if (level === 'lenguaje') { activeFilters.categoria = null; activeFilters.tipo = null; } 
                else if (level === 'categoria') { activeFilters.tipo = null; }
            }
            renderFilters();
            renderCards();
        }

        function renderCards() {
            let data = getActiveData();
            if (activeFilters.lenguaje) data = data.filter(d => d.lenguaje === activeFilters.lenguaje);
            if (activeFilters.categoria) data = data.filter(d => d.categoria === activeFilters.categoria);
            if (activeFilters.tipo) data = data.filter(d => d.tipo === activeFilters.tipo);

            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                // Protección contra campos nulos o indefinidos
                data = data.filter(d => 
                    (d.elemento || '').toLowerCase().includes(q) ||
                    (d.sintaxis || '').toLowerCase().includes(q) ||
                    (d.descripcion || '').toLowerCase().includes(q) ||
                    (d.ejemplo || '').toLowerCase().includes(q) ||
                    (d.errores || '').toLowerCase().includes(q)
                );
            }

            document.getElementById('result-count').textContent = data.length;
            const cardsContainerEl = document.getElementById('cards-container');
            const emptyStateEl = document.getElementById('empty-state');

            if (data.length === 0) {
                cardsContainerEl.innerHTML = '';
                emptyStateEl.classList.remove('hidden');
                emptyStateEl.classList.add('flex');
                return;
            }

            emptyStateEl.classList.add('hidden');
            emptyStateEl.classList.remove('flex');

            cardsContainerEl.innerHTML = data.map(item => `
                <div class="card-hover bg-white dark:bg-ksap-surface rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="px-2 py-0.5 rounded text-xs font-bold bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 uppercase tracking-wide">${item.lenguaje}</span>
                            <span class="text-xs text-gray-500 dark:text-gray-400">${item.categoria} > ${item.tipo}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.openModal('${item.id}')" class="p-1.5 rounded-lg bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-900/40 transition-colors" title="Editar">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button onclick="window.deleteData('${item.id}')" class="p-1.5 rounded-lg bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/40 transition-colors" title="Eliminar">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                    <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">${item.elemento}</h3>
                    ${item.sintaxis ? `<div class="mb-3"><code class="block bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg p-3 text-sm font-mono text-ksap-primary overflow-x-auto">${item.sintaxis}</code></div>` : ''}
                    <p class="text-sm text-gray-600 dark:text-gray-300 mb-3 leading-relaxed">${item.descripcion}</p>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
                        ${item.ejemplo ? `<div class="bg-green-50 dark:bg-green-900/20 border border-green-100 dark:border-green-800 rounded-lg p-3"><div class="text-xs font-semibold text-green-700 dark:text-green-400 mb-1 uppercase tracking-wider">Ejemplo KSAP</div><div class="text-gray-700 dark:text-gray-300">${item.ejemplo}</div></div>` : '<div></div>'}
                        ${item.errores ? `<div class="bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800 rounded-lg p-3"><div class="text-xs font-semibold text-red-700 dark:text-red-400 mb-1 uppercase tracking-wider">Errores Comunes</div><div class="text-gray-700 dark:text-gray-300">${item.errores}</div></div>` : '<div></div>'}
                    </div>
                </div>
            `).join('');
        }

        const modal = document.getElementById('add-modal');
        const fabAdd = document.getElementById('fab-add');
        const modalClose = document.getElementById('modal-close');
        const modalBackdrop = document.getElementById('modal-backdrop');
        const addForm = document.getElementById('add-form');
        const modalTitle = document.getElementById('modal-title');
        const submitBtn = document.getElementById('submit-btn');
        const deleteBtn = document.getElementById('delete-btn');

        window.openModal = function(id = null) {
            updateDatalists();
            editingId = id;
            const data = getActiveData();
            const itemToEdit = id ? data.find(d => d.id === id) : null;
            
            if (itemToEdit) {
                addForm.lenguaje.value = itemToEdit.lenguaje;
                addForm.categoria.value = itemToEdit.categoria;
                addForm.tipo.value = itemToEdit.tipo;
                addForm.elemento.value = itemToEdit.elemento;
                addForm.sintaxis.value = itemToEdit.sintaxis || '';
                addForm.descripcion.value = itemToEdit.descripcion;
                addForm.ejemplo.value = itemToEdit.ejemplo || '';
                addForm.errores.value = itemToEdit.errores || '';
                modalTitle.textContent = 'Editar Registro';
                submitBtn.textContent = 'Actualizar Registro';
                deleteBtn.classList.remove('hidden');
            } else {
                addForm.reset();
                modalTitle.textContent = 'Añadir Nuevo Registro';
                submitBtn.textContent = 'Guardar Registro';
                deleteBtn.classList.add('hidden');
            }
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        };

        function closeModal() {
            modal.classList.add('hidden');
            document.body.style.overflow = '';
            addForm.reset();
            editingId = null;
        }

        fabAdd.addEventListener('click', () => window.openModal(null));
        modalClose.addEventListener('click', closeModal);
        modalBackdrop.addEventListener('click', closeModal);
        deleteBtn.addEventListener('click', () => { if (editingId) { window.deleteData(editingId); closeModal(); } });

        addForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(addForm);
            const newItem = {
                id: editingId || 'custom_' + Date.now(),
                lenguaje: formData.get('lenguaje').trim(),
                categoria: formData.get('categoria').trim(),
                tipo: formData.get('tipo').trim(),
                elemento: formData.get('elemento').trim(),
                sintaxis: formData.get('sintaxis').trim(),
                descripcion: formData.get('descripcion').trim(),
                ejemplo: formData.get('ejemplo').trim(),
                errores: formData.get('errores').trim()
            };
            saveCustomData(newItem);
            closeModal();
            renderFilters();
            renderCards();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        if (localStorage.getItem('ksap_dark_mode') === 'true') document.documentElement.classList.add('dark');
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('ksap_dark_mode', document.documentElement.classList.contains('dark'));
        });

        document.getElementById('reset-data-btn').addEventListener('click', resetData);
        document.getElementById('clear-filters').addEventListener('click', () => {
            activeFilters = { lenguaje: null, categoria: null, tipo: null };
            renderFilters();
            renderCards();
        });

        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchQuery = e.target.value.trim();
                renderCards();
            }, 300);
        });

        // INICIALIZACIÓN CON DIAGNÓSTICO VISIBLE
        document.addEventListener('DOMContentLoaded', () => {
            try {
                if (!defaultData || defaultData.length === 0) throw new Error("La base de datos de registros está vacía.");
                console.log(`✅ Inicializando Chuletero KSAP con ${defaultData.length} registros.`);
                renderFilters();
                renderCards();
            } catch (error) {
                console.error('❌ Error crítico al inicializar:', error);
                const cardsContainerEl = document.getElementById('cards-container');
                if (cardsContainerEl) {
                    cardsContainerEl.innerHTML = `
                        <div class="p-6 bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-300 rounded-xl border-2 border-red-200 dark:border-red-800 text-center">
                            <h3 class="text-xl font-bold mb-3">⚠️ Error al cargar la aplicación</h3>
                            <p class="text-sm mb-4 font-mono bg-red-100 dark:bg-red-900/40 p-3 rounded-lg text-left">${error.message}</p>
                            <p class="text-sm mb-4">Esto puede deberse a un error de sintaxis o a un almacenamiento local corrupto/bloqueado.</p>
                            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                                <button onclick="localStorage.clear(); location.reload();" class="px-6 py-3 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700 transition-all shadow-md">
                                    🗑️ Borrar datos y Recargar
                                </button>
                                <button onclick="location.reload();" class="px-6 py-3 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 font-bold rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">
                                    🔄 Solo Recargar
                                </button>
                            </div>
                        </div>
                    `;
                }
            }
        });
    </script>
</body>
</html>
